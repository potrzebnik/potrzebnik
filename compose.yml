services:
  postgres:
    image: postgres:18.3
    container_name: potrzebnik-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432" ##remove it in prod if app on the same server. use networks
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
