name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. new push to an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only reads the checked-out code.
permissions:
  contents: read

jobs:
  quality:
    name: Quality (type-check, lint, format, build, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Cheap static checks first so obvious failures stop the job before `build`.
      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Reuse Next.js compiler artifacts across runs. Key on lockfile + source so a
      # source change reuses the closest prior cache (restore-key) instead of going cold.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build
        # `next build` collects page data for /api/auth/[...all], which loads the
        # auth + db config at module level and validates these vars are present.
        # The build never connects anywhere — these are throwaway placeholders, not
        # secrets. Google auth is disabled so client id/secret aren't needed.
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          POSTGRES_PORT: '5432'
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-long-enough
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_AUTH_ENABLED: 'false'

      - name: Unit tests
        run: pnpm test

  storybook:
    name: Storybook component + a11y tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Cache the downloaded browser so `playwright install` is a no-op on a hit.
      # Keyed on the lockfile, which pins the Playwright (and browser) version.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Storybook stories run in a real Chromium browser (vitest browser mode)
      # with the a11y addon, so the browser binary must be installed first.
      - name: Install Chromium for Storybook tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Storybook component + a11y tests
        run: pnpm test:storybook

  integration:
    name: Integration tests (testcontainers Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Integration tests
        run: pnpm test:integration
