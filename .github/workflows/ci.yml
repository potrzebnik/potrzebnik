name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. new push to an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job only reads the checked-out code.
permissions:
  contents: read

jobs:
  quality:
    name: Quality (type-check, lint, format, build, unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      # Cheap static checks first so obvious failures stop the job before `build`.
      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Reuse Next.js compiler artifacts across runs. Key on lockfile + source so a
      # source change reuses the closest prior cache (restore-key) instead of going cold.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
          POSTGRES_PORT: '5432'
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-long-enough
          BETTER_AUTH_URL: http://localhost:3000
          GOOGLE_AUTH_ENABLED: 'false'

      - name: Unit tests
        run: pnpm test

  storybook:
    name: Storybook component + a11y tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          node-version: 22

      - name: Install Chromium for Storybook tests
        env:
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: timeout 240 pnpm exec playwright install --with-deps --only-shell chromium

      - name: Storybook component + a11y tests
        run: pnpm test:storybook

  integration:
    name: Integration tests (testcontainers Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Integration tests
        run: pnpm test:integration
