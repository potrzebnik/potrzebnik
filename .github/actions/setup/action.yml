name: Setup
description: Install pnpm + Node (from .nvmrc) and project dependencies.

inputs:
  node-version:
    description: Override the Node version. Empty falls back to .nvmrc.
    required: false
    default: ''

# Shared prelude for every CI job. Checkout must run in the job before this
# composite (the local action isn't on disk until the repo is checked out).
runs:
  using: composite
  steps:
    # pnpm version comes from package.json "packageManager" (single source of truth).
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    # `node-version` wins when set; otherwise setup-node falls back to .nvmrc.
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
